name: Continente E2E Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'continente-ecommerce/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'continente-ecommerce/**'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./continente-ecommerce/e2e

    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'pnpm'
        cache-dependency-path: './continente-ecommerce/e2e/pnpm-lock.yaml'
        
    - name: Install dependencies
      run: pnpm install

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run Playwright tests
      run: pnpm exec playwright test
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: ./continente-ecommerce/e2e/playwright-report/
        retention-days: 30